name: CI MDB

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    name: Proves en PHP ${{ matrix.php-version }}
    
    steps:
    # 1. Descarrega el codi del repositori
    - name: Checkout del codi
      uses: actions/checkout@v4

    # 2. Prepara PHP al runner amb la versió de la matriu
    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, openssl, zip

    # 3. Instal·la les dependències amb composer
    - name: Instal·lar dependències (Composer)
      run: composer install --prefer-dist --no-progress

    # 4. Executa els tests amb phpunit
    - name: Executar tests (PHPUnit)
      run: ./vendor/bin/phpunit