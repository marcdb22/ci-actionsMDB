name: CI MDB

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    name: Proves en PHP ${{ matrix.php-version }}
    
    steps:
    - name: Checkout del codi
      uses: actions/checkout@v4

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, openssl, zip

    - name: Instal·lar dependències (Composer)
      run: composer install --prefer-dist --no-progress

    # Modificat per guardar el log en format JUnit
    - name: Executar tests (PHPUnit)
      run: ./vendor/bin/phpunit --log-junit resultats.xml

    # Pas nou per pujar l'artefacte sempre (encara que fallin els tests)
    - name: Pujar informe de resultats
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: resultats-MDB
        path: resultats.xml